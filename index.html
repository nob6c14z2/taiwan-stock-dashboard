<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股儀表板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.container{max-width:760px;margin:0 auto;padding:1.25rem 1rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:500}
.header .meta{font-size:12px;color:#666;display:flex;align-items:center;gap:8px}
.refresh-btn{background:#3266ad;border:none;border-radius:8px;color:#fff;font-size:12px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{background:#185fa5}
.refresh-btn:disabled{background:#aaa;cursor:not-allowed}
.section-title{font-size:13px;font-weight:500;color:#555;margin-bottom:.65rem;display:flex;align-items:center;gap:6px}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}

/* 股票表格 */
.stock-table{width:100%;border-collapse:collapse;table-layout:fixed}
.stock-table th{font-size:11px;color:#888;font-weight:400;padding:4px 6px;text-align:left;border-bottom:0.5px solid #eee}
.stock-table th:nth-child(3),.stock-table th:nth-child(4),.stock-table th:nth-child(5){text-align:right}
.stock-table td{font-size:13px;padding:8px 6px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
.stock-table tr:last-child td{border-bottom:none}
.stock-table tr:hover td{background:#fafafa}
.stock-table td:nth-child(3),.stock-table td:nth-child(4),.stock-table td:nth-child(5){text-align:right}
.rank{font-size:11px;color:#bbb;width:20px;display:inline-block;text-align:center}
.sname{font-size:13px;font-weight:500}
.scode{font-size:11px;color:#999;margin-top:1px}
.up{color:#c0392b}
.down{color:#27ae60}
.flat{color:#888}
.vol-cell{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.vbar-bg{width:48px;height:4px;background:#eee;border-radius:2px;overflow:hidden;flex-shrink:0}
.vbar{height:100%;border-radius:2px;background:#3266ad;opacity:.6}

/* 新聞 */
.search-wrap{margin-bottom:.75rem}
.search-wrap input{width:100%;height:36px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;padding:0 12px}
.search-wrap input:focus{outline:2px solid #3266ad;outline-offset:1px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.chip{font-size:12px;padding:3px 10px;border-radius:999px;border:0.5px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{background:#f0f0f0}
.chip.active{background:#e6f1fb;border-color:#3266ad;color:#185fa5}
.chip .cnt{font-size:10px;opacity:.7;margin-left:3px}
.news-card{padding:.75rem 0;border-bottom:0.5px solid #f0f0f0;text-decoration:none;display:block;color:inherit;transition:background .1s}
.news-card:last-child{border-bottom:none}
.news-card:hover .news-title{color:#3266ad}
.news-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.news-src{font-size:11px;color:#888}
.news-time{font-size:11px;color:#aaa}
.ntags{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.ntag{font-size:10px;padding:1px 7px;border-radius:999px;background:#e6f1fb;color:#185fa5}
.news-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px;line-height:1.45;transition:color .12s}
.news-summary{font-size:12px;color:#666;line-height:1.65}
.no-result{text-align:center;padding:2rem;color:#aaa;font-size:13px}

/* 國際趨勢 */
.trend-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.65rem}
.trend-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.trend-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:400}
.badge-hot{background:#faeeda;color:#854f0b}
.badge-watch{background:#e6f1fb;color:#185fa5}
.badge-risk{background:#fcebeb;color:#a32d2d}
.trend-body{font-size:12px;color:#555;line-height:1.7}

/* 載入 */
.skeleton{background:#f0f0f0;border-radius:4px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-msg{text-align:center;padding:1.5rem;color:#888;font-size:13px}
.spinner{width:18px;height:18px;border:2px solid #ddd;border-top-color:#3266ad;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-4px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fcebeb;color:#a32d2d;border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-bottom:.75rem}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>📈 台股儀表板</h1>
  <div class="meta">
    <span id="update-time">載入中...</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
      <span id="refresh-icon">↻</span> 更新
    </button>
  </div>
</div>

<div class="card">
  <div class="section-title">🔥 今日成交量排行 TOP 10（不含 ETF）</div>
  <div id="stock-area"><div class="loading-msg"><span class="spinner"></span>載入股票資料中...</div></div>
</div>

<div class="card">
  <div class="section-title">📰 今日財經新聞</div>
  <div class="search-wrap">
    <input type="text" id="newsSearch" placeholder="搜尋個股名稱或關鍵字..." oninput="filterNews()">
  </div>
  <div class="chips" id="filterChips"></div>
  <div id="news-area"><div class="loading-msg"><span class="spinner"></span>載入新聞中...</div></div>
</div>

<div class="card">
  <div class="section-title">🌐 國際產業趨勢</div>
  <div id="trend-area"><div class="loading-msg"><span class="spinner"></span>整理趨勢報告中...</div></div>
</div>

</div>

<script>
const API_KEY = '';
let allNews = [];
let activeFilter = null;

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  return text;
}

async function loadStocks() {
  const area = document.getElementById('stock-area');
  try {
    const raw = await callClaude(
      `請搜尋今日台灣股市成交量排行前10名（排除ETF和ETN，只要一般股票），` +
      `回傳純JSON陣列，格式為 [{"rank":1,"code":"2330","name":"台積電","price":1080,"chg":10,"pct":0.93,"vol":198000}]，` +
      `price單位元、chg漲跌金額、pct漲跌百分比（含正負號數字）、vol成交張數。` +
      `只回傳JSON不要任何說明或markdown。`
    );
    const clean = raw.replace(/```json|```/g, '').trim();
    const stocks = JSON.parse(clean);
    renderStocks(stocks);
  } catch(e) {
    area.innerHTML = `<div class="error-msg">⚠️ 股票資料載入失敗，請稍後再試。</div>`;
  }
}

function renderStocks(stocks) {
  const maxVol = Math.max(...stocks.map(s => s.vol));
  let html = `<table class="stock-table"><thead><tr>
    <th style="width:28px">#</th>
    <th>股票</th>
    <th style="width:80px">股價</th>
    <th style="width:110px">漲跌</th>
    <th style="width:110px">成交量(張)</th>
  </tr></thead><tbody>`;
  stocks.forEach(s => {
    const cls = s.pct > 0 ? 'up' : s.pct < 0 ? 'down' : 'flat';
    const sign = s.pct > 0 ? '+' : '';
    const barW = Math.round(s.vol / maxVol * 100);
    html += `<tr>
      <td><span class="rank">${s.rank}</span></td>
      <td><div class="sname">${s.name}</div><div class="scode">${s.code}</div></td>
      <td class="${cls}">${Number(s.price).toLocaleString()}</td>
      <td class="${cls}">${sign}${s.chg} (${sign}${Number(s.pct).toFixed(2)}%)</td>
      <td><div class="vol-cell"><span>${Number(s.vol).toLocaleString()}</span><div class="vbar-bg"><div class="vbar" style="width:${barW}%"></div></div></div></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('stock-area').innerHTML = html;
}

async function loadNews() {
  const area = document.getElementById('news-area');
  try {
    const today = new Date().toLocaleDateString('zh-TW');
    const raw = await callClaude(
      `請搜尋今日（${today}）台灣財經新聞5則和國際財經新聞3則，` +
      `將每則新聞整理成一小段摘要（2-3句話），並找出文中提到的台灣個股名稱（最多3個）。` +
      `回傳純JSON陣列，格式：[{"title":"新聞標題","summary":"摘要內容","tags":["台積電"],"source":"來源名稱","url":"新聞網址","time":"時間","type":"tw或intl"}]。` +
      `url請填真實的新聞網址。只回傳JSON不要任何說明或markdown。`
    );
    const clean = raw.replace(/```json|```/g, '').trim();
    allNews = JSON.parse(clean);
    buildChips();
    renderNews();
  } catch(e) {
    area.innerHTML = `<div class="error-msg">⚠️ 新聞載入失敗，請稍後再試。</div>`;
  }
}

function buildChips() {
  const mentions = {};
  allNews.forEach(n => (n.tags||[]).forEach(t => { mentions[t] = (mentions[t]||0)+1; }));
  const sorted = Object.entries(mentions).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const el = document.getElementById('filterChips');
  el.innerHTML = '';
  sorted.forEach(([name, cnt]) => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.innerHTML = `${name}<span class="cnt">${cnt}</span>`;
    chip.onclick = () => {
      if(activeFilter === name){ activeFilter = null; chip.classList.remove('active'); }
      else { document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); activeFilter = name; chip.classList.add('active'); }
      document.getElementById('newsSearch').value = '';
      renderNews();
    };
    el.appendChild(chip);
  });
}

function filterNews() {
  activeFilter = null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  renderNews();
}

function renderNews() {
  const q = document.getElementById('newsSearch').value.trim();
  let filtered = allNews;
  if(activeFilter) filtered = allNews.filter(n=>(n.tags||[]).includes(activeFilter));
  else if(q) filtered = allNews.filter(n=>n.title.includes(q)||n.summary.includes(q)||(n.tags||[]).some(t=>t.includes(q)));
  const el = document.getElementById('news-area');
  if(!filtered.length){ el.innerHTML='<div class="no-result">找不到相關新聞</div>'; return; }
  el.innerHTML = filtered.map(n=>{
    const tags = (n.tags||[]).map(t=>`<span class="ntag">${t}</span>`).join('');
    const srcBadge = n.type==='intl' ? '<span style="font-size:10px;padding:1px 6px;border-radius:999px;background:#eaf3de;color:#3b6d11;margin-left:4px">國際</span>' : '';
    return `<a class="news-card" href="${n.url||'#'}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-src">${n.source||''}${srcBadge}</span>
        <span class="news-time">· ${n.time||''}</span>
        <div class="ntags">${tags}</div>
      </div>
      <div class="news-title">${n.title}</div>
      <div class="news-summary">${n.summary}</div>
    </a>`;
  }).join('');
}

async function loadTrends() {
  const area = document.getElementById('trend-area');
  try {
    const raw = await callClaude(
      `請根據本週國際財經與科技新聞，整理3個最重要的產業趨勢，每個趨勢給一個標題、一個熱度標籤（熱門/關注/風險）和2-3句說明，` +
      `重點放在對台灣相關產業（半導體、電子、AI）的影響。` +
      `回傳純JSON陣列，格式：[{"title":"趨勢標題","badge":"熱門","body":"說明內容"}]。` +
      `只回傳JSON不要任何說明或markdown。`
    );
    const clean = raw.replace(/```json|```/g, '').trim();
    const trends = JSON.parse(clean);
    const badgeMap = {'熱門':'badge-hot','關注':'badge-watch','風險':'badge-risk'};
    area.innerHTML = trends.map(t=>`
      <div class="trend-card">
        <div class="trend-title">
          ${t.title}
          <span class="trend-badge ${badgeMap[t.badge]||'badge-watch'}">${t.badge}</span>
        </div>
        <div class="trend-body">${t.body}</div>
      </div>
    `).join('');
  } catch(e) {
    area.innerHTML = `<div class="error-msg">⚠️ 趨勢報告載入失敗。</div>`;
  }
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.style.display = 'inline-block';
  icon.style.animation = 'spin .7s linear infinite';

  document.getElementById('stock-area').innerHTML = '<div class="loading-msg"><span class="spinner"></span>載入股票資料中...</div>';
  document.getElementById('news-area').innerHTML = '<div class="loading-msg"><span class="spinner"></span>載入新聞中...</div>';
  document.getElementById('trend-area').innerHTML = '<div class="loading-msg"><span class="spinner"></span>整理趨勢報告中...</div>';
  document.getElementById('filterChips').innerHTML = '';
  allNews = [];
  activeFilter = null;

  const now = new Date();
  document.getElementById('update-time').textContent =
    `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 更新`;

  await Promise.all([loadStocks(), loadNews(), loadTrends()]);

  btn.disabled = false;
  icon.style.animation = '';
}

loadAll();
</script>
</body>
</html>
